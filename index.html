// 👁 ดูรหัส
function togglePass(){
 const p = document.getElementById("pass");
 p.type = (p.type==="password") ? "text":"password";
}


const PATTERNS=[
"PPPP","PPPB","PPBP","PPBB",
"PBPP","PBPB","PBBP","PBBB",
"BPPP","BPPB","BPBP","BPBB",
"BBPP","BBPB","BBBP","BBBB"
];

let trick4Stats = {
  win: 0,
  lose: 0
};
let history=[];
let patterns=[];

let trickStep = 0; // 🔥 ตัวนับลำดับแทง

function init(){
  const box = document.getElementById("patterns-container");
  box.innerHTML = "";
  patterns = [];

  PATTERNS.forEach((code,i)=>{
    const id = i+1;

    patterns.push({
      id,
      code,
      step:0,
      stats:{p:0,b:0,t:0,total:0,win:0},
      currentPrediction:null,
      results:[]
    });

    const el = document.createElement("div");
    el.className = "pattern-row";

    el.innerHTML = `

      <div>
        ${
          code.split("").map(c=>{
            let cls = "";

            if(c === "P") cls = "pat-p";
            else if(c === "B") cls = "pat-b";

            return `<span class="pat-cell ${cls}">${c}</span>`;
          }).join("")
        }
      </div>

      <div id="dots-${id}" style="
        display:grid;
        grid-template-columns:repeat(20,14px);
        gap:2px;
        max-height:32px;
      "></div>

      <div id="pct-${id}">0%</div>

      <div class="pred-circle" id="pred-${id}">-</div>
    `;

    box.appendChild(el);
  });

  renderBeadRoad();

  // 🔥 FIX: ลบ % trick4 ตอน init (กันค้างจากรอบก่อน)
  const percentBox = document.getElementById("trick4-percent");
  if(percentBox) percentBox.remove();
}



function recalcAll(){

 // 🔥 reset ก่อน
 patterns.forEach(p=>{
  p.step = 0;
  p.results = [];
  p.stats = {p:0,b:0,t:0,total:0,win:0};
  p.currentPrediction = null;
 });

 // 🔥 LOOP history (อันนี้ห้ามลืมเด็ดขาด)
 history.forEach(r=>{

  patterns.forEach(p=>{

    const expect = p.code[p.step];

    // 🔥 กรณี T → ข้าม
   if(r === "T"){
  p.stats.t++;   // นับเฉยๆ
  return;        // ❗ ไม่ push ไม่ยุ่ง results
}

    const isWin = (r === expect);

    p.results.push(isWin ? 'W' : 'L');

    if(isWin) p.stats.win++;

    if(r==="P") p.stats.p++;
    else if(r==="B") p.stats.b++;

    p.stats.total++;

    // 🔁 เดิน step เฉพาะ P/B
    p.step = (p.step + 1) % p.code.length;

    // 👉 prediction ถัดไป
    p.currentPrediction = p.code[p.step];

  });

 });

}

// ==========================
// 🔥 STREAK (ต้องมีตัวนี้ก่อน)
// ==========================
function getStreak(){

  const noTie = history.filter(x => x !== "T");

  if(noTie.length < 2) return 1;

  let last = noTie[noTie.length - 1];
  let count = 1;

  for(let i = noTie.length - 2; i >= 0; i--){
    if(noTie[i] === last){
      count++;
    }else{
      break;
    }
  }

  return count;
}



function getGameMode(){

  const noTie = history.filter(x=>x!=="T");
  const streak = getStreak();

  if(noTie.length < 4) return "NORMAL";

  // 🐉 มังกร (แรงขึ้น)
  if(streak >= 4){
    return "DRAGON";
  }

  // 🔁 1-3 (ขยาย pattern)
  const last4 = noTie.slice(-4).join("");
  const oneThreeList = ["PBBB","BPPP","PPPB","BBBP"];

  if(oneThreeList.includes(last4)){
    return "ONE_THREE";
  }

  // 🔀 สลับ (ตรวจละเอียดขึ้น)
  if(noTie.length >= 6){
    const last6 = noTie.slice(-6).join("");
    const zigzagList = ["PBPBPB","BPBPBP","PPBBPP","BBPPBB"];

    if(zigzagList.includes(last6)){
      return "ZIGZAG";
    }
  }

  return "NORMAL";
}


function finalDecision(pred){

  const mode = getGameMode();
  const noTie = history.filter(x=>x!=="T");

  const last = noTie[noTie.length - 1];

  if(!last) return pred;

  if(mode === "DRAGON"){
    return last;
  }

  if(mode === "ONE_THREE"){
    return last;
  }

  if(mode === "ZIGZAG"){
    return last === "P" ? "B" : "P";
  }

  return pred;
}



function addResult(r){
  history.push(r);

  // 🔥 เช็คเฉพาะ P/B
  if(r !== "T" && currentPlay.length === 4){

    const predict = currentPlay[playIndex];

    // 🔥 กันกรณี SKIP (ไม่มีตัวแทงจริง)
    if(!predict) return;

    const isWin = (predict === r);

    addTrickDot(isWin); // 👉 แสดงผลทันที

    playIndex++;

    // 🔁 ครบ 4 ไม้ → reset
    if(playIndex >= 4){
      playIndex = 0;
    }
  }

  // 🔥 นับ step เดิม
  if(r !== "T"){
    trickStep++;
  }

  recalcAll();
  updateUI();
}




function undo(){

 if(history.length === 0) return;

 const last = history[history.length - 1];

 // 🔥 ลบผลทีละตัว
 if(last !== "T"){
   removeLastTrickDot();

   playIndex--;
   if(playIndex < 0) playIndex = 3;
 }

 history.pop();

 // 🔥 step เดิม
 if(last !== "T"){
   trickStep--;
   if(trickStep < 0) trickStep = 0;
 }

 recalcAll();
 updateUI();
}



function renderTrick4(){

 const el = document.getElementById("trick4");
 if(!el) return;

 const noTie = history.filter(x => x !== "T");

 if(noTie.length < 8){
   el.innerHTML = "WAIT...";
   return;
 }

 el.innerHTML = "";

 // 🔥 แบ่งเป็นชุดละ 4
 const groups = [];
 for(let i=0;i<noTie.length;i+=4){
   const g = noTie.slice(i,i+4);
   if(g.length === 4){
     groups.push(g);
   }
 }

 // 🔥 ต้องมีอย่างน้อย 2 ชุด
 if(groups.length < 2){
   el.innerHTML = "WAIT...";
   return;
 }

 // 🔥 เทียบทีละคู่
 for(let i=1;i<groups.length;i++){

   const prev = groups[i-1];
   const curr = groups[i];

   let same = 0;
   let diff = 0;

   for(let j=0;j<4;j++){
     if(prev[j] === curr[j]) same++;
     else diff++;
   }
// =========================
// ✅ FINAL LOGIC (ของจริง)
// =========================
let playMode = null;

// ❌ เท่ากัน → ไม่เล่น
if(same === diff){
  playMode = null;
}
else if(same < diff){
  // 👉 เหมือนน้อย → แทงเหมือน
  playMode = "เหมือน";
}
else{
  // 👉 ต่างน้อย → แทงต่าง
  playMode = "ต่าง";
}

  // =========================
  // ✅ สร้างตัวแทง
  // =========================
  let play = [];

  if(playMode === "เหมือน"){
    play = [...curr];
  }else{
    play = curr.map(x => x === "P" ? "B" : "P");
  }

// 🔥 ⭐ วางตรงนี้ ⭐
if(i === groups.length - 1){

  if(playMode !== null){
    currentPlay = [...play];
  }else{
    currentPlay = []; // 🔥 เคลียร์ทิ้งเลย (หัวใจหลัก)
  }

}

// 🔥 ตรวจมังกร
let dragonText = "";

if(play.join("") === "PPPP"){
  dragonText = "🐉 มังกร P (ตามแต่ระวัง)";
}
else if(play.join("") === "BBBB"){
  dragonText = "🐉 มังกร B (ตามแต่ระวัง)";
}


  // =========================
  // ✅ สร้าง UI
  // =========================
  const row = document.createElement("div");
  row.className = "trick-row";

  // 🔥 ⭐ ไฮไลท์บล็อคล่าสุด
  if(i === groups.length - 1){
    row.style.border = "1px solid gold";
    row.style.boxShadow = "0 0 10px gold";
  }



   row.innerHTML = `
     <div class="trick-box">
       ${prev.map(x=>`<div class="trick-cell trick-${x.toLowerCase()}">${x}</div>`).join("")}
     </div>

     <div class="trick-result">
  ${same}ตัวเหมือน / ${diff}ตัวต่าง
  ${dragonText ? `<div style="color:#ffd700;font-size:11px">${dragonText}</div>` : ""}
</div>

     <div class="trick-box">
       ${curr.map(x=>`<div class="trick-cell trick-${x.toLowerCase()}">${x}</div>`).join("")}
     </div>

     <div class="trick-box">
<div class="trick-box">
  ${
    playMode === null
    ? `<div style="color:#888">SKIP</div>`
   : play.map((x,idx)=>{

          const isActive = (idx === (trickStep % 4));

          return `
            <div class="trick-cell trick-${x.toLowerCase()} ${
              (i === groups.length - 1 && isActive) ? 'trick-play-active' : ''
            }">
              ${x}
            </div>
          `;

        }).join("")
    }
  </div>
`;

el.appendChild(row);
 }
}


// 🔥 ⭐ วางตรงนี้ ⭐
function addTrickDot(isWin){

  const el = document.getElementById("trick4-result");

  // 🔥 นับสถิติ
  if(isWin) trick4Stats.win++;
  else trick4Stats.lose++;

  // 🔥 ถ้ายังไม่มี pack → สร้างใหม่
  if(!el.lastChild || el.lastChild.children.length >= 4){
    const pack = document.createElement("div");
    pack.className = "trick4-pack";
    el.appendChild(pack);
  }

  const pack = el.lastChild;

  const d = document.createElement("div");
  d.className = "trick4-dot";

  d.classList.add(isWin ? "trick4-win" : "trick4-lose");
  d.innerText = isWin ? "✔" : "✖";

  pack.appendChild(d);

  updateTrick4Percent(); // 🔥 เพิ่มบรรทัดนี้
}


// 🔥 ⭐ วางตรงนี้ ⭐
function removeLastTrickDot(){

  const el = document.getElementById("trick4-result");
  if(!el.lastChild) return;

  const pack = el.lastChild;
if(pack.lastChild){

  if(pack.lastChild.classList.contains("trick4-win")){
    trick4Stats.win = Math.max(0, trick4Stats.win - 1);
  }else{
    trick4Stats.lose = Math.max(0, trick4Stats.lose - 1);
  }

  pack.removeChild(pack.lastChild);
}


  if(pack.children.length === 0){
    el.removeChild(pack);
  }

  updateTrick4Percent(); // 🔥 เพิ่ม
}


// ==============================
// 🔥 วางตรงนี้เลย (ใต้ removeLastTrickDot)
// ==============================
function updateTrick4Percent(){

  const total = trick4Stats.win + trick4Stats.lose;

  let pct = 0;
  if(total > 0){
    pct = Math.round((trick4Stats.win / total) * 100);
  }

  let percentBox = document.getElementById("trick4-percent");

  // 🔥 ถ้ายังไม่มี → สร้าง
  if(!percentBox){
    percentBox = document.createElement("div");
    percentBox.id = "trick4-percent";

    percentBox.style.marginTop = "6px";
    percentBox.style.fontSize = "12px";
    percentBox.style.color = "#ffd700";
    percentBox.style.fontWeight = "bold";

    // 🔥 สำคัญ: ไปอยู่นอก grid
    const parent = document.getElementById("trick4-result").parentElement;
    parent.appendChild(percentBox);
  }

  percentBox.innerText =
    `WIN ${trick4Stats.win} / LOSE ${trick4Stats.lose} (${pct}%)`;
}




function renderTrick4Result(){

  const el = document.getElementById("trick4-result");
  if(!el) return;

  el.innerHTML = "";

  const noTie = history.filter(x => x !== "T");

  if(noTie.length < 5){
    el.innerHTML = "<span style='color:#666'>WAIT...</span>";
    return;
  }

  // 🔥 แบ่งชุด 4
  const groups = [];
  for(let i=0;i<noTie.length;i+=4){
    const g = noTie.slice(i,i+4);
    if(g.length === 4) groups.push(g);
  }

  if(groups.length < 1) return;

  // 🔥 loop ทุกชุด
  for(let i=1;i<groups.length;i++){

    const prev = groups[i-1];
    const curr = groups[i];

    let same = 0;

    for(let j=0;j<4;j++){
      if(prev[j] === curr[j]) same++;
    }

    const diff = 4 - same;

    let playMode = null;

    if(same === diff) continue;
    else if(same < diff) playMode = "same";
    else playMode = "diff";

    let play = [];

    if(playMode === "same"){
      play = [...curr];
    }else{
      play = curr.map(x => x === "P" ? "B" : "P");
    }

    // 🔥 เอาผลจริง "ปัจจุบัน" มาเทียบทีละตัว
    const startIndex = i * 4;

    const pack = document.createElement("div");
    pack.className = "trick4-pack";

    for(let j=0;j<4;j++){

      const real = noTie[startIndex + j]; // 🔥 ทีละไม้
      if(!real) break;

      const d = document.createElement("div");
      d.className = "trick4-dot";

      const isWin = (play[j] === real);

      d.classList.add(isWin ? "trick4-win" : "trick4-lose");
      d.innerText = isWin ? "✔" : "✖";

      pack.appendChild(d);
    }

    el.appendChild(pack);
  }
}


function updateUI(){

 const total = history.length;
 const p = history.filter(x=>x==="P").length;
 const b = history.filter(x=>x==="B").length;
 const t = history.filter(x=>x==="T").length;

 document.getElementById("total-p").innerText = p;
 document.getElementById("total-b").innerText = b;
 document.getElementById("total-t").innerText = t;
 document.getElementById("total-all").innerText = total;

renderBeadRoad();

// 🔥 STEP 1: หา % สูงสุด
let maxPct = 0;

patterns.forEach(p=>{
 const pct = p.stats.total
   ? Math.round((p.stats.win/p.stats.total)*100)
   : 0;

 if(pct > maxPct) maxPct = pct;
});

// 🔥 STEP 2: render + ใส่ effect
patterns.forEach(pat=>{

  const pct = pat.stats.total
   ? Math.round((pat.stats.win/pat.stats.total)*100)
   : 0;

  // 👉 ดึงแถว
  const row = document.getElementById(`pct-${pat.id}`).parentElement;

  // 🔥 ล้างก่อน
  row.classList.remove("top-pattern");

  // 🔥 ถ้า % สูงสุด → กระพริบ
  if(pct === maxPct && pct > 0){
    row.classList.add("top-pattern");
  }

  document.getElementById(`pct-${pat.id}`).innerText = pct+"%";
const predEl = document.getElementById(`pred-${pat.id}`);

// 🔥 reset class ก่อน
predEl.classList.remove("pred-p","pred-b","pred-t");

// 🔥 ใส่ค่า
const finalPred = finalDecision(pat.currentPrediction);

predEl.innerText = finalPred || "-";

// 🔥 ใส่สีตามค่า
if(finalPred === "P"){
  predEl.classList.add("pred-p");
}
else if(finalPred === "B"){
  predEl.classList.add("pred-b");
}
else if(finalPred === "T"){
  predEl.classList.add("pred-t");
}

// ==========================
// 🔥 DOT RESULT (ของเดิม)
// ==========================
const dots = document.getElementById(`dots-${pat.id}`);
dots.innerHTML = "";

pat.results.forEach(r=>{
  const d = document.createElement("div");

  // 🔥 base style
  d.className = "result-dot";

  if(r === "W"){
    d.classList.add("dot-win");
    d.innerText = "✔";

  }else if(r === "L"){
    d.classList.add("dot-lose");
    d.innerText = "✖";
  }

  dots.appendChild(d);
});

// 🔥 auto scroll
dots.scrollLeft = dots.scrollWidth;

});

// ==========================
// 🔥 UI อื่นๆ (ของเดิม)
// ==========================
renderQuickView();
renderTrick4();
//renderTrick4Result();
updateTrick4Percent();

// ==========================
// 🔥 GAME MODE (เพิ่มตรงนี้)
// ==========================
const mode = getGameMode();

let text = "";
let color = "#fff";
let glow = "";

if(mode === "DRAGON"){
  text = "🐉 DRAGON MODE (ตามน้ำ)";
  color = "#ff4d4d";
  glow = "0 0 15px #ff0000";
}
else if(mode === "ONE_THREE"){
  text = "🔁 1-3 MODE (ตาม)";
  color = "#22c55e";
  glow = "0 0 15px #22c55e";
}
else if(mode === "ZIGZAG"){
  text = "🔀 ZIGZAG MODE (สวน)";
  color = "#38bdf8";
  glow = "0 0 15px #38bdf8";
}
else{
  text = "⚪ NORMAL MODE";
  color = "#aaa";
  glow = "none";
}

const modeBox = document.getElementById("gameModeBox");

if(modeBox){
  modeBox.innerText = text;
  modeBox.style.color = color;
  modeBox.style.textShadow = glow;
}
}


function renderQuickView(){

 const box = document.getElementById("quick-view");

 // 🔥 ซ่อน/แสดง
 const boxWrap = box.parentElement;
 if(history.length === 0){
   boxWrap.style.display = "none";
   return;
 }else{
   boxWrap.style.display = "block";
 }

 box.innerHTML = "";

 // 🔥 หา % สูงสุด
 let maxPct = 0;
 patterns.forEach(p=>{
   const pct = p.stats.total
     ? Math.round((p.stats.win/p.stats.total)*100)
     : 0;
   if(pct > maxPct) maxPct = pct;
 });

 // 🔥 sort
 const sorted = [...patterns].sort((a,b)=>{
   const pctA = a.stats.total ? (a.stats.win/a.stats.total) : 0;
   const pctB = b.stats.total ? (b.stats.win/b.stats.total) : 0;
   return pctB - pctA;
 });

 const top6 = sorted.slice(0,6);

 top6.forEach(p=>{
   const pct = p.stats.total
     ? Math.round((p.stats.win/p.stats.total)*100)
     : 0;

   const div = document.createElement("div");
   div.className = "quick-item";

   // 🔥 กระพริบตัว Top
   if(pct === maxPct && pct > 0){
     div.classList.add("quick-top");
   }

   let colorClass = "";
   if(p.currentPrediction === "P") colorClass = "quick-p";
   else if(p.currentPrediction === "B") colorClass = "quick-b";
   else colorClass = "quick-t";

   div.innerHTML = `
     <div class="quick-left">
       <div class="quick-pred ${colorClass}">
         ${p.currentPrediction || "-"}
       </div>
       <div class="quick-code">${p.code}</div>
     </div>

     <div class="quick-pct">${pct}%</div>
   `;

   box.appendChild(div);
 });
}



function clearData(){

  if(!confirm("ล้างข้อมูลทั้งหมด?")) return;

  // 🔥 1. reset history + step
  history = [];
  trickStep = 0;

  // 🔥 2. reset trick4 stats
  trick4Stats = { win:0, lose:0 };

  // 🔥 3. ล้าง UI จุดผล
  document.getElementById("trick4-result").innerHTML = "";

  // 🔥 3.1 ลบ % ออกด้วย (สำคัญมาก)
  const percentBox = document.getElementById("trick4-percent");
  if(percentBox) percentBox.remove();

  // 🔥 4. reset play
  currentPlay = [];
  playIndex = 0;

  recalcAll();
  updateUI();
}




function renderBeadRoad(){
  const grid = document.getElementById("bead-grid");
  grid.innerHTML = "";

  const rows = 6;

  // 🔥 จำนวนคอลัมน์ = จำนวนข้อมูล / 6
  const cols = Math.ceil(history.length / rows) || 1;

  grid.style.gridTemplateRows = `repeat(${rows}, 40px)`;
  grid.style.gridAutoFlow = "column"; // 🔥 สำคัญมาก
  grid.style.gridTemplateColumns = `repeat(${cols}, 40px)`;

  // เติมช่องว่างทั้งหมด
  for(let i = 0; i < rows * cols; i++){

    const d = document.createElement("div");
    d.className = "bead";

    if(i < history.length){

      const v = history[i];

      if(v === "P") d.classList.add("b-p");
      if(v === "B") d.classList.add("b-b");
      if(v === "T") d.classList.add("b-t");

      d.innerText = v;

    } else {
      d.classList.add("b-empty");
    }

    grid.appendChild(d);
  }
}

init();
updateUI();


</script>
